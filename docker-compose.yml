services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personal_finance"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: finance-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 5001
      CLIENT_URL: http://localhost:5173
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: personal_finance
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
    container_name: finance-client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5001/api
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  postgres_data:
